<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | DrainCleaningNearMe.us</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem 0;
        }

        .error-card {
            max-width: 720px;
            background: rgba(17, 24, 39, 0.82);
            border: 1px solid var(--c-border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .error-card h1 {
            font-size: clamp(2rem, 4vw, 3.25rem);
            margin-bottom: 1rem;
            color: var(--c-heading);
        }

        .error-card p {
            color: var(--c-text-muted);
            margin-bottom: 1rem;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <main class="error-page">
        <div class="container">
            <div class="error-card">
                <p style="color:#FF6B35; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;">500 Error
                </p>
                <h1>Something went wrong</h1>
                <p>The server hit an unexpected error. Please try again shortly, return home, or call for immediate
                    assistance.</p>
                <div class="error-actions">
                    <a href="/" class="btn btn--primary">Back Home</a>
                    <a href="tel:+17247506935" class="btn btn--accent">Call (724) 750-6935</a>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
